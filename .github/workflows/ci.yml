name: CI

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Test & build web frontend
        run: cd web && npm ci && npm run test && npm run build

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --features web

      # The ONNX regression tests (tests/unit_toxicity_token_limit.rs, #220) are
      # model-gated and SKIP when the model files are absent. Without this the
      # suite goes green in CI while never exercising the path at all — a
      # regression test that cannot fail protects nothing.
      #
      # ~216MB (126MB toxicity + 90MB embedding), so it is cached. The key
      # includes download.rs so changing a model URL busts the cache.
      - name: Cache ONNX models
        id: cache-models
        uses: actions/cache@v4
        with:
          path: models
          key: ${{ runner.os }}-charcoal-models-${{ hashFiles('src/toxicity/download.rs') }}

      - name: Download ONNX models
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: cargo run --features web -- download-model
        env:
          CHARCOAL_MODEL_DIR: models

      - name: Tests
        run: cargo test --features web
        env:
          CHARCOAL_MODEL_DIR: models
