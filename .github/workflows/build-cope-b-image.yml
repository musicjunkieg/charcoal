name: Build CoPE-B image

on:
  push:
    # feat/cope-b-self-host is included temporarily so the image can be built
    # from the feature branch before the work merges to staging/main (a push
    # trigger runs the workflow version on the pushed branch; workflow_dispatch
    # would require the file to already be on the default branch). Drop the
    # feat/* entry once this lands on staging.
    branches: [main, staging, feat/cope-b-self-host]
    paths:
      - 'gpu/cope-b-runpod/**'
      - '.github/workflows/build-cope-b-image.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # The CoPE-B-A4B weights are ~50 GB (Gemma-4 26B-A4B, 25B params), and the
      # Dockerfile bakes them into the image. A stock ubuntu-latest runner only
      # has ~45-50 GB free, so the build runs out of disk and the runner dies
      # mid-build. Reclaim the preinstalled toolchains we don't need (~25-30 GB)
      # before building.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive policy version
        id: policyver
        run: |
          short_sha=$(git rev-parse --short HEAD)
          date=$(date -u +%Y-%m-%d)
          echo "value=policy-${short_sha}-${date}" >> "$GITHUB_OUTPUT"

      - name: Derive image ref tag
        id: reftag
        # Docker tags can't contain '/', so slugify the branch name (e.g.
        # feat/cope-b-self-host -> feat-cope-b-self-host). GITHUB_REF_NAME is a
        # built-in env var; read it from env (not ${{ }} interpolation) so the
        # branch name can never be injected into the shell.
        run: echo "value=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./gpu/cope-b-runpod
          file: ./gpu/cope-b-runpod/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/charcoal-cope-b:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/charcoal-cope-b:${{ steps.reftag.outputs.value }}
          build-args: |
            MODEL_REVISION=main
            POLICY_VERSION=${{ steps.policyver.outputs.value }}
          # No GHA layer cache: the ~50 GB weight layer exceeds GitHub's 10 GB
          # cache-entry limit (it can never be stored), and exporting layers
          # locally before upload adds disk pressure on an already-tight runner.
          # Skipping the cache keeps the build within the runner's disk budget.
          # (If rebuilds become frequent, move to a self-hosted/large runner with
          # a persistent BuildKit cache rather than type=gha.)

      - name: Summary
        run: |
          echo "Built ghcr.io/${{ github.repository_owner }}/charcoal-cope-b:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Policy version: ${{ steps.policyver.outputs.value }}" >> $GITHUB_STEP_SUMMARY
          echo "Next: update RunPod endpoint to use this image digest." >> $GITHUB_STEP_SUMMARY
